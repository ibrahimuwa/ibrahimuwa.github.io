<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="{{ '/' | relative_url }}" class="brand">
        <span class="brand-name">Muhammad Ibrahim</span>
        <span class="brand-tag">PhD · Research Scientist · UWA</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">About</a>
        <a href="{{ '/research/' | relative_url }}">Research</a>
        <a href="{{ '/publications/' | relative_url }}">Publications</a>
        <a href="{{ '/teaching/' | relative_url }}">Teaching</a>
        <a href="{{ '/projects/' | relative_url }}">Projects</a>
        <a href="{{ '/cv/' | relative_url }}">CV</a>
      </nav>
    </div>
  </header>

  <main class="wrap content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <div class="links">
        <a href="mailto:{{ site.email }}">Email</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="{{ site.google_scholar }}" target="_blank" rel="noopener">Google Scholar</a>
      </div>
      <p class="copy">&copy; {{ 'now' | date: "%Y" }} Muhammad Ibrahim. Built with Jekyll &amp; GitHub Pages.</p>
    </div>
  </footer>
</body>
</html>
